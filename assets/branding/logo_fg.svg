<?xml version="1.0" encoding="UTF-8"?>
<!-- Foreground for adaptive icon: transparent bg, art centered in safe zone.
     Canvas 1024; art scaled up to fill the central safe area well on a white bg. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5C6BC0"/>
      <stop offset="1" stop-color="#3949AB"/>
    </linearGradient>
  </defs>
  <g transform="translate(512,512) scale(1.28)">
    <!-- Tilted contactless card -->
    <g transform="rotate(-18)">
      <rect x="-150" y="-200" width="300" height="400" rx="42" ry="42"
            fill="url(#card)"/>
      <!-- chip -->
      <rect x="-108" y="-150" width="86" height="66" rx="14" fill="#FFD54F"/>
      <line x1="-65" y1="-150" x2="-65" y2="-84" stroke="#B8860B" stroke-width="4"/>
      <line x1="-108" y1="-117" x2="-22" y2="-117" stroke="#B8860B" stroke-width="4"/>
      <!-- contactless waves -->
      <g fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round">
        <path d="M 40 -70 A 70 70 0 0 1 40 70"/>
        <path d="M 78 -110 A 120 120 0 0 1 78 110"/>
        <path d="M 116 -150 A 170 170 0 0 1 116 150"/>
      </g>
    </g>
  </g>
</svg>
